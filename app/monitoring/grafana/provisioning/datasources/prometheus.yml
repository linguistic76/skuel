# Grafana Datasource Provisioning
# =================================
# Auto-configures Prometheus as default datasource on Grafana startup.
#
# Grafana will automatically discover this file and add Prometheus datasource.
# No manual configuration needed in Grafana UI.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
