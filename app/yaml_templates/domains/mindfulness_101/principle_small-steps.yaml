version: 1.0
type: Principle

uid: principle:small-steps
name: Small Steps Beat Big Bursts
statement: I commit to consistent tiny actions over heroic sprints
description: |
  Sustainable change comes from small, repeated actions rather than
  occasional intense efforts. Two minutes daily beats one hour weekly.

# Classification
category: personal
source: personal
strength: strong

# Philosophical Context
tradition: Behavioral Psychology / Habit Formation
original_source: BJ Fogg - Tiny Habits, James Clear - Atomic Habits
personal_interpretation: |
  In mindfulness practice, the principle of small steps is fundamental.
  A daily 2-minute practice builds the neural pathways and habit consistency
  that a weekly 30-minute session cannot achieve.

# Learning Integration
supported_knowledge_domains:
  - ku:breath-awareness-basics
  - ku:mind-wandering-happens

guided_goal_uids:
