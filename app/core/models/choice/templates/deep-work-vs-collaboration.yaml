# Choice Template: Deep Work vs Collaborative Work Style
# Category: Professional / Work Style
# SKUEL Mission: INSPIRE self-awareness in work preferences

template_id: deep-work-vs-collaboration
template_version: "1.0"
created_by: "SKUEL"
category: career

title: "Deep Work or Collaborative Work?"
description: |
  Understand your optimal work style. Do you thrive in solo deep work sessions
  or collaborative team environments? Both are valuable - choose the path that
  energizes you and aligns with your career goals.

inspiration_type: life_direction
expands_possibilities: true
vision_statement: "Work in a way that maximizes your natural strengths"

choice_type: multiple
domain: professional
priority: medium

options:
  - title: "Deep Work Specialist"
    description: |
      Focus on long, uninterrupted sessions of concentrated work. Develop
      expertise in complex problem-solving, detailed analysis, or creative
      work that requires sustained attention. Minimize meetings and
      collaboration, maximize solo productivity.

    opens_learning_paths:
      - lp:deep-work-mastery
      - lp:focus-techniques
      - lp:solo-productivity

    informed_by_knowledge_uids:
      - ku:deep-work-principles
      - ku:flow-state-triggers
      - ku:attention-management

    feasibility_score: 0.7
    risk_level: 0.3
    potential_impact: 0.9
    resource_requirement: 0.4
    estimated_duration: 60  # hours to establish practice

    tags:
      - deep-work
      - focus
      - solo
      - expertise

  - title: "Collaboration Champion"
    description: |
      Excel in team environments where diverse perspectives create better
      outcomes. Develop skills in communication, coordination, and bringing
      out the best in others. Thrive on interaction, brainstorming, and
      collective problem-solving.

    opens_learning_paths:
      - lp:effective-collaboration
      - lp:communication-mastery
      - lp:team-dynamics

    informed_by_knowledge_uids:
      - ku:collaboration-principles
      - ku:active-listening
      - ku:group-dynamics

    feasibility_score: 0.8
    risk_level: 0.2
    potential_impact: 0.8
    resource_requirement: 0.5
    estimated_duration: 80  # hours to develop skills

    tags:
      - collaboration
      - teamwork
      - communication
      - social

  - title: "Balanced Hybrid Approach"
    description: |
      Design a work style that alternates between deep work and collaboration.
      Use your calendar strategically - deep work mornings, collaborative
      afternoons. Get the best of both worlds with intentional design.

    opens_learning_paths:
      - lp:work-design-mastery
      - lp:calendar-optimization
      - lp:energy-management

    informed_by_knowledge_uids:
      - ku:time-blocking
      - ku:energy-cycles
      - ku:maker-manager-schedule

    feasibility_score: 0.6
    risk_level: 0.4
    potential_impact: 0.9
    resource_requirement: 0.7
    estimated_duration: 100  # hours to optimize

    tags:
      - hybrid
      - balanced
      - strategic
      - optimized

decision_criteria:
  - "Do you get energy from people or from solitude?"
  - "Do your best ideas come from solo thinking or group brainstorming?"
  - "What type of work problems excite you most?"
  - "How much control do you have over your schedule?"

constraints:
  - "Some careers/roles require specific work styles"
  - "Company culture may limit flexibility"
  - "Deep work requires environment control"
  - "Collaboration requires available team members"

requires_knowledge_for_decision:
  - ku:personality-work-styles
  - ku:intro-extro-spectrum
  - ku:work-environment-factors

aligned_with_principles:
  - principle:self-awareness
  - principle:intentional-living
  - principle:productivity
  - principle:authenticity

tags:
  - work-style
  - productivity
  - self-discovery
  - professional-development
