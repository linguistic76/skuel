# Prometheus Configuration for SKUEL (Local Development)
# ========================================================
# Use this config when running the app OUTSIDE Docker (uv run python main.py)
# while Prometheus runs INSIDE Docker.
#
# Usage:
#   # Update docker-compose.yml to mount this file:
#   volumes:
#     - ./monitoring/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml
#
# Scrape endpoint: http://host.docker.internal:8000/metrics (Mac/Windows)
#                  http://172.17.0.1:8000/metrics (Linux)
# Prometheus UI: http://localhost:9090

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alerting rules
rule_files:
  - '/etc/prometheus/alerts.yml'

scrape_configs:
  - job_name: 'skuel-app'
    static_configs:
      # Local development (app running on host machine)
      # Mac/Windows: Use host.docker.internal
      - targets: ['host.docker.internal:8000']

      # Linux alternative: Use Docker bridge IP
      # Uncomment for Linux and comment out host.docker.internal:
      # - targets: ['172.17.0.1:8000']

    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
