# docker-compose.yml
# SKUEL Application Docker Compose Configuration
# ==============================================
# This file runs ONLY the SKUEL application in Docker.
# Neo4j infrastructure runs separately in ~/skuel/infrastructure.
#
# ⚠️ RECOMMENDED WORKFLOW:
#    cd ~/skuel/infrastructure && docker compose up -d   # Start Neo4j
#    cd ~/skuel/app && docker compose up -d              # Start app (Docker)
#    OR: cd ~/skuel/app && poetry run python main.py     # Start app (local)
#
# This docker-compose.yml is for:
#   - Running SKUEL app in Docker (connects to ~/skuel/infrastructure Neo4j)
#   - CI/CD environments (requires external Neo4j)
#   - Testing containerized application deployment
#
# For full production deployment (including Neo4j), use docker-compose.production.yml
# ==============================================

services:
  # --------------------------------------------------------------------------
  # SKUEL Application
  # --------------------------------------------------------------------------
  # Connects to Neo4j running in ~/skuel/infrastructure (via host.docker.internal
  # on Mac/Windows or 172.17.0.1 on Linux)
  # --------------------------------------------------------------------------
  skuel-app:
    build: .
    container_name: skuel-app
    environment:
      # Neo4j connection to ~/skuel/infrastructure instance
      # Use host.docker.internal (Mac/Win) or 172.17.0.1 (Linux) to connect to host
      NEO4J_URI: ${NEO4J_URI:-bolt://host.docker.internal:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

      # Application settings
      APP_HOST: 0.0.0.0  # Must be 0.0.0.0 for Docker
      APP_PORT: ${APP_PORT:-5001}
      APP_DEBUG: ${APP_DEBUG:-false}

      # AI Services (optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}

      # Paths
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-./vault}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${APP_PORT:-5001}:5001"
    volumes:
      - .:/app
      - ${OBSIDIAN_VAULT_PATH:-./vault}:/app/vault
      - ./static:/app/static
      - ./templates:/app/templates
      - ./logs:/app/logs
    networks:
      - skuel-network
    restart: unless-stopped
    # Note: Requires Neo4j running in ~/skuel/infrastructure (cd ~/skuel/infrastructure && docker compose up -d)
    command: python skuel.py

  # --------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # --------------------------------------------------------------------------
  # Scrapes /metrics endpoint from skuel-app every 15 seconds
  # Prometheus UI: http://localhost:9090
  # Alerts API: http://localhost:9090/api/v1/rules
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: skuel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml  # Phase 1 - Alerting rules
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'  # 7 days retention for development
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Allows Prometheus to reach host machine (Linux)
    restart: unless-stopped
    networks:
      - skuel-network

  # --------------------------------------------------------------------------
  # Grafana - Metrics Visualization
  # --------------------------------------------------------------------------
  # Dashboards for system health, domain activity, graph health, search quality
  # Grafana UI: http://localhost:3000 (default: admin/admin)
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.0
    container_name: skuel-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped
    networks:
      - skuel-network
    depends_on:
      - prometheus

networks:
  skuel-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
