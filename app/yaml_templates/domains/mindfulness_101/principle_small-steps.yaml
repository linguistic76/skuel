  - habit:label-wander-daily

related_principle_uids:
  - principle:attention-over-intensity

# Expressions & Applications
key_behaviors:
  - Start with 2-minute sessions instead of 20-minute goals
  - Practice daily rather than seeking perfect conditions
  - Celebrate showing up, not duration

decision_criteria:
  - When choosing practice duration, choose the smaller sustainable option
  - When facing resistance, reduce scope rather than skip entirely
  - When planning, prioritize frequency over intensity

# Alignment Tracking
current_alignment: mostly_aligned
last_review_date: 2025-10-04

# Personal Reflection
why_important: |
  This principle keeps me from the all-or-nothing trap.
  It's the difference between building a practice and burning out.

origin_story: |
  Adopted after repeatedly failing to maintain "proper" 20-minute meditation sessions.
  Realized that 2 minutes daily for 30 days built more skill than sporadic longer sessions.

