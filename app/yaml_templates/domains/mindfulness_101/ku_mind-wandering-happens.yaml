uid: ku:mind-wandering-happens
title: Mind Wandering Happens
content: |
  ## Mind Wandering is Normal

  Your mind will wander during meditation. That's not a problem—it's the practice.

  ### The Pattern

  1. **You're focused** on the breath
  2. **Mind drifts** to thoughts, plans, memories
  3. **You notice** the drift (this is the key moment!)
  4. **You return** to the breath, gently

  This cycle repeats. Each time you notice and return, you're training attention.

  ### The Gentle Return

  Don't judge yourself for wandering. Don't force attention back harshly.

  Just **label it softly**: "Thinking" or "Wandering"
  Then **guide attention back**: Return to the breath

  ### Why This Matters

  - **Noticing** builds awareness
  - **Returning** strengthens focus
  - **Not judging** cultivates kindness

  Wandering isn't failure. Noticing wandering IS the practice.

