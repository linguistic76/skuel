# Habit Guide

## Why This Habit?

Code review is one of the most effective ways to improve as a developer...

## Daily Process

### Morning Review (15 min)
1. Check pending pull requests
2. Review one thoroughly
3. Leave constructive comments

### Afternoon Review (15 min)
1. Review your own recent code
2. Identify improvements
3. Make notes for tomorrow

## What to Look For

- Code clarity and readability
- Potential bugs or edge cases
- Performance issues
- Security concerns
- Best practices

## Progress Tracking

Week 1: Focus on understanding
Week 2: Start identifying patterns
Week 3: Provide feedback
Week 4: Reflect on learning