# Choice Template: Choose Your Side Project Direction
# Category: Project / Creative
# SKUEL Mission: INSPIRE creative action through project possibilities

template_id: side-project-direction
template_version: "1.0"
created_by: "SKUEL"
category: skills

title: "What Should I Build Next?"
description: |
  Choose your next side project based on your learning goals and interests.
  Each project type develops different skills and offers unique rewards.
  The best project is one that excites you AND teaches you valuable skills.

inspiration_type: project_idea
expands_possibilities: true
vision_statement: "Build something meaningful while learning valuable skills"

choice_type: multiple
domain: professional
priority: medium

options:
  - title: "Personal Productivity Tool"
    description: |
      Build a tool that solves a problem you face daily - task manager,
      habit tracker, note-taking app, etc. Learn full-stack development
      while creating something immediately useful.

    opens_learning_paths:
      - lp:full-stack-web-app
      - lp:product-design-basics
      - lp:user-experience-fundamentals

    informed_by_knowledge_uids:
      - ku:web-app-architecture
      - ku:database-design
      - ku:user-interface-patterns

    feasibility_score: 0.8
    risk_level: 0.2
    potential_impact: 0.7
    resource_requirement: 0.5
    estimated_duration: 100  # hours

    tags:
      - web-app
      - full-stack
      - practical

  - title: "Data Analysis & Visualization Project"
    description: |
      Analyze interesting datasets and create visualizations - sports stats,
      financial trends, health data, etc. Learn data science skills while
      uncovering insights about topics you care about.

    opens_learning_paths:
      - lp:data-analysis-python
      - lp:data-visualization
      - lp:statistical-thinking

    informed_by_knowledge_uids:
      - ku:python-pandas
      - ku:data-visualization-principles
      - ku:statistical-analysis

    feasibility_score: 0.7
    risk_level: 0.3
    potential_impact: 0.8
    resource_requirement: 0.4
    estimated_duration: 80  # hours

    tags:
      - data
      - analytics
      - visualization

  - title: "Open Source Contribution"
    description: |
      Contribute to an existing open source project you use and appreciate.
      Learn collaborative development, code review, and industry best practices
      while giving back to the community.

    opens_learning_paths:
      - lp:open-source-contribution
      - lp:git-collaboration
      - lp:code-review-skills

    informed_by_knowledge_uids:
      - ku:git-advanced
      - ku:pull-request-workflow
      - ku:open-source-etiquette

    feasibility_score: 0.6
    risk_level: 0.4
    potential_impact: 0.9
    resource_requirement: 0.6
    estimated_duration: 60  # hours

    tags:
      - open-source
      - collaboration
      - community

  - title: "AI/ML Experiment"
    description: |
      Build a machine learning model or AI-powered application. Experiment
      with image recognition, natural language processing, or recommendation
      systems. Learn cutting-edge AI skills hands-on.

    opens_learning_paths:
      - lp:machine-learning-basics
      - lp:deep-learning-intro
      - lp:ai-application-building

    informed_by_knowledge_uids:
      - ku:machine-learning-fundamentals
      - ku:neural-networks-basics
      - ku:python-ml-libraries

    feasibility_score: 0.5
    risk_level: 0.5
    potential_impact: 1.0
    resource_requirement: 0.8
    estimated_duration: 150  # hours

    tags:
      - ai
      - machine-learning
      - cutting-edge

decision_criteria:
  - "What skills do you want to develop most?"
  - "Do you prefer building from scratch or contributing to existing projects?"
  - "How much time can you commit? (60-150 hours)"
  - "Do you want immediate utility or learning challenge?"

constraints:
  - "Time commitment varies significantly (60-150 hours)"
  - "Some options require more prerequisite knowledge"
  - "AI/ML projects require more computational resources"

requires_knowledge_for_decision:
  - ku:programming-basics
  - ku:project-scoping
  - ku:time-estimation

aligned_with_principles:
  - principle:learning-by-doing
  - principle:continuous-improvement
  - principle:creative-expression

tags:
  - project
  - building
  - skill-development
  - hands-on
