title: Reflect on your first week
description: |
  After completing one week of practice (5-7 days), take 5 minutes to reflect:

  Prompt questions:
  - What patterns did you notice in your wandering mind?
  - What was easier than expected?
  - What was harder than expected?
  - How did the practice affect the rest of your day?
  - What do you want to continue/adjust?

