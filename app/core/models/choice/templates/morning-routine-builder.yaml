# Choice Template: Build Your Morning Routine
# Category: Lifestyle / Habits
# SKUEL Mission: INSPIRE healthy lifestyle choices

template_id: morning-routine-builder
template_version: "1.0"
created_by: "SKUEL"
category: lifestyle

title: "Design Your Ideal Morning Routine"
description: |
  Your morning sets the tone for your entire day. Choose a routine that
  aligns with your energy patterns, goals, and lifestyle. Each approach
  offers different benefits and requires different commitments.

inspiration_type: life_direction
expands_possibilities: true
vision_statement: "Master your mornings, master your day"

choice_type: multiple
domain: health
priority: medium

options:
  - title: "Energize & Move First"
    description: |
      Start with physical activity - exercise, yoga, or stretching.
      Build energy and mental clarity through movement before anything else.
      Best for: Active people who think better after moving.

    opens_learning_paths:
      - lp:morning-movement-practice
      - lp:exercise-habit-building

    informed_by_knowledge_uids:
      - ku:exercise-benefits-morning
      - ku:habit-stacking-principles

    feasibility_score: 0.7
    risk_level: 0.3
    potential_impact: 0.8
    resource_requirement: 0.6
    estimated_duration: 30  # minutes daily

    tags:
      - exercise
      - energy
      - physical

  - title: "Mindful & Reflective Start"
    description: |
      Begin with meditation, journaling, or quiet reflection.
      Center yourself mentally and emotionally before engaging with the day.
      Best for: Contemplative people who value inner clarity.

    opens_learning_paths:
      - lp:morning-mindfulness-practice
      - lp:journaling-mastery

    informed_by_knowledge_uids:
      - ku:meditation-basics
      - ku:journaling-techniques
      - ku:mindfulness-benefits

    feasibility_score: 0.8
    risk_level: 0.2
    potential_impact: 0.7
    resource_requirement: 0.3
    estimated_duration: 20  # minutes daily

    tags:
      - mindfulness
      - reflection
      - mental

  - title: "Learn & Grow First"
    description: |
      Dedicate your freshest mental energy to learning - reading, studying,
      or skill development. Make progress on your learning goals daily.
      Best for: Intellectual growth-focused individuals.

    opens_learning_paths:
      - lp:morning-learning-ritual
      - lp:daily-reading-habit

    informed_by_knowledge_uids:
      - ku:peak-cognitive-hours
      - ku:spaced-repetition
      - ku:morning-productivity

    feasibility_score: 0.8
    risk_level: 0.2
    potential_impact: 0.9
    resource_requirement: 0.5
    estimated_duration: 45  # minutes daily

    tags:
      - learning
      - growth
      - cognitive

decision_criteria:
  - "When is your peak energy - physical or mental?"
  - "What matters most: body health, mental clarity, or skill growth?"
  - "How much time can you realistically dedicate each morning?"

constraints:
  - "Requires waking up 30-45 minutes earlier"
  - "Needs consistency to build habit (21-90 days)"
  - "May require lifestyle adjustments"

requires_knowledge_for_decision:
  - ku:chronotype-assessment
  - ku:habit-formation-science
  - ku:willpower-energy

aligned_with_principles:
  - principle:self-care
  - principle:consistency
  - principle:intentional-living

tags:
  - morning
  - routine
  - habits
  - lifestyle
