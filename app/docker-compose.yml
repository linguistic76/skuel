# docker-compose.yml — Unified SKUEL Development Stack
# =====================================================
# Single command to start everything: docker compose up
#
# Services: Neo4j -> SKUEL App -> Prometheus -> Grafana
#
# WORKFLOWS:
#   Full stack (Docker):     docker compose up
#   Full stack (detached):   docker compose up -d
#   Neo4j only (local dev):  docker compose up neo4j -d
#                            poetry run python main.py
#
# Neo4j data is stored at ${NEO4J_DATA_DIR:-../infrastructure/neo4j}/
# so both this compose and infrastructure/docker-compose.yml share
# the same database files. No migration needed.
#
# For production deployment, see docker-compose.production.yml
# =====================================================

services:
  # --------------------------------------------------------------------------
  # Neo4j Graph Database
  # --------------------------------------------------------------------------
  # Same config as infrastructure/docker-compose.yml.
  # Data bind-mounted from ../infrastructure/neo4j/ by default.
  # --------------------------------------------------------------------------
  neo4j:
    image: neo4j:2025.12.1
    container_name: skuel-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"  # HTTP (Neo4j Browser)
      - "127.0.0.1:7687:7687"  # Bolt (Application connection)
    environment:
      # Plugins
      NEO4J_PLUGINS: '["apoc", "genai"]'

      # Authentication
      NEO4J_AUTH: "${NEO4J_AUTH}"

      # GenAI plugin
      OPENAI_API_KEY: "${NEO4J_OPENAI_API_KEY}"

      # Memory (Phase 6.3 tuned)
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INIT:-1G}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX:-1500M}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE:-2G}"

      # Transaction timeout
      NEO4J_db_transaction_timeout: 600s

      # Query optimization
      NEO4J_server_memory_query__cache_per__db__cache__num__entries: "2000"
      NEO4J_dbms_cypher_planner: COST

      # Slow query logging
      NEO4J_db_logs_query_enabled: INFO
      NEO4J_db_logs_query_threshold: 1s
      NEO4J_db_logs_query_parameter__logging__enabled: "true"

      # Security — allow GenAI + APOC meta procedures
      NEO4J_dbms_security_procedures_unrestricted: "genai.*,apoc.meta.*"
      NEO4J_dbms_security_procedures_allowlist: "genai.*,apoc.meta.*"

      # Network
      NEO4J_server_bolt_enabled: "true"
      NEO4J_server_bolt_listen__address: 0.0.0.0:7687
      NEO4J_server_http_enabled: "true"
      NEO4J_server_http_listen__address: 0.0.0.0:7474
    volumes:
      - ${NEO4J_DATA_DIR:-../infrastructure/neo4j}/data:/data
      - ${NEO4J_DATA_DIR:-../infrastructure/neo4j}/logs:/logs
      - ${NEO4J_DATA_DIR:-../infrastructure/neo4j}/conf:/conf
      - ${NEO4J_DATA_DIR:-../infrastructure/neo4j}/plugins:/plugins
      - ${NEO4J_DATA_DIR:-../infrastructure/neo4j}/import:/import
      - ${NEO4J_DATA_DIR:-../infrastructure/neo4j}/backups:/backups
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - skuel-network

  # --------------------------------------------------------------------------
  # SKUEL Application
  # --------------------------------------------------------------------------
  skuel-app:
    build: .
    container_name: skuel-app
    environment:
      # Neo4j — use Docker service name, overrides .env bolt://localhost:7687
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

      # Application
      APP_HOST: 0.0.0.0
      APP_PORT: ${APP_PORT:-8000}
      APP_DEBUG: ${APP_DEBUG:-false}

      # AI Services
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}

      # Paths
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-./vault}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    volumes:
      - .:/app
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - skuel-network
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Prometheus — Metrics Collection
  # --------------------------------------------------------------------------
  # Scrapes /metrics from skuel-app:8000 every 15s
  # UI: http://localhost:9090
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: skuel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - skuel-network

  # --------------------------------------------------------------------------
  # Grafana — Metrics Visualization
  # --------------------------------------------------------------------------
  # UI: http://localhost:3000 (default: admin/admin)
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.0
    container_name: skuel-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped
    networks:
      - skuel-network
    depends_on:
      - prometheus

networks:
  skuel-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
