# Lesson Template
# ================
# This is a TEMPLATE EXAMPLE, not a validation schema.
# It shows ALL valid fields for Lesson YAML files.
#
# A Lesson is a unit for learning -- content that composes concepts
# into coherent learning material. Lessons compose atomic Kus
# into coherent learning content via USES_KU relationships.
#
# Lesson vs Ku:
#   - Lesson: unit for learning (full markdown, learning metadata)
#   - Ku: atomic reference node (no content body, no learning metadata)
#
# Purpose: Use this as a reference when creating teaching content.
# Note: type: Article is accepted as an alias for type: Lesson.

# REQUIRED FIELDS
# ---------------

version: 1.0
type: Lesson

# uid: Unique identifier
# Pattern: l:{namespace}:{slug} or l:{slug}
# Example: l:mindfulness:breath-awareness-basics, l:calculus:derivative-rules
uid: l:namespace:example-slug

# title: Display title for this lesson
# Type: String
# Example: "Breath Awareness -- Basics", "Buzzing, Stimulants, and Calm"
title: Example Lesson Title

# content: Full markdown teaching narrative
# Format: Markdown with headers, bullets, code blocks, etc.
# Minimum: 1 character
content: |
  ## Introduction

  Your main teaching content goes here. Use markdown formatting.

  ## Key Concepts

  1. First concept
  2. Second concept

  ## Examples

  Concrete examples that illustrate the teaching points.

  ## Summary

  Wrap up the key takeaways here.

# OPTIONAL FIELDS
# ---------------

# sel_category: Social Emotional Learning category
# Valid values: self_awareness, self_management, social_awareness,
#               relationship_skills, responsible_decision_making
# Default: null
# Purpose: Organizes lessons under SEL competency tabs on the /ku page
sel_category: self_awareness

# domain: Knowledge domain classification
# Valid values: personal, professional, technical, health, financial, social
# Default: personal
domain: personal

# complexity: Difficulty level of the content
# Valid values: basic, medium, advanced
# Default: medium
# Note: Use 'basic' not 'beginner'!
complexity: basic

# learning_level: Target learner level
# Valid values: beginner, intermediate, advanced, expert
# Default: null
learning_level: beginner

# estimated_time_minutes: Expected time to read/study
# Type: Integer
# Unit: Minutes
# Example: 15 for a short lesson, 45 for a deep dive
estimated_time_minutes: 15

# learning_objectives: What the learner will gain
# Type: List of strings
# Purpose: Clear outcomes for the reader
learning_objectives:
  - Understand the basic concept
  - Apply the technique in practice

# uses_kus: Atomic Kus this Lesson composes into its narrative
# Type: List of Ku UIDs
# Purpose: Declares which atomic knowledge units this Lesson teaches
# Graph: Creates (Lesson)-[:USES_KU]->(Ku) relationships
uses_kus:
  - ku:namespace:concept-1
  - ku:namespace:concept-2

# quality_score: Quality rating of this content
# Type: Float between 0.0 and 1.0
# Default: 0.0
quality_score: 0.85

# connections: Prerequisite and enabling relationships to other Lessons
# Type: Object with 'requires' and 'enables' lists
# Purpose: Build knowledge graph between Lessons
connections:
  requires:
    - l:namespace:prerequisite-lesson
  enables:
    - l:namespace:next-lesson

# tags: Descriptive tags for categorization
# Type: List of strings
tags:
  - tag1
  - tag2

# METADATA FIELDS (Auto-populated, DO NOT SET)
# --------------------------------------------
# These fields are automatically set by the system:
# - created_at: Timestamp when created
# - updated_at: Timestamp when last modified

# IMPORTANT NOTES
# ---------------
# 1. Lesson replaced the old "Article" and "KnowledgeUnit" types (March 2026 renames)
# 2. Old YAML files with type: Article or type: KnowledgeUnit will be ingested as Lessons
# 3. content is REQUIRED -- Lessons are teaching documents
# 4. uses_kus links to atomic Ku nodes (the concepts this Lesson teaches)
# 5. Use complexity (basic/medium/advanced) not difficulty for Lessons
# 6. connections.requires/enables build the Lesson prerequisite graph
