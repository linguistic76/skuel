title: Breath Awareness — Basics
content: |
  ## Introduction to Breath Awareness

  Breath awareness is the foundational practice of mindfulness meditation.
  It involves gently directing your attention to the natural rhythm of your breathing.

  ### Why Breath?

  - **Always Available**: Your breath is with you every moment
  - **Anchors Attention**: Provides a consistent focus point
  - **Non-Judgmental**: No right or wrong way to breathe
  - **Calming**: Natural rhythms soothe the nervous system

  ### The Basic Practice

  1. **Find a comfortable position** - Sitting, lying, or standing
  2. **Close your eyes** (or soft gaze downward)
  3. **Notice your breath** - Don't change it, just observe
  4. **Follow the sensation** - Chest rising, air flowing, belly expanding
  5. **When mind wanders** - Gently return to the breath

  ### Two Minutes is Enough

  You don't need long sessions to benefit. Even 2 minutes of breath awareness
  can shift your state and build the habit.

  Start small, be consistent.

