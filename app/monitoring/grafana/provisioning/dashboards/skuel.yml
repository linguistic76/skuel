# Grafana Dashboard Provisioning
# ================================
# Auto-loads dashboards from /var/lib/grafana/dashboards on startup.
#
# Dashboards are version-controlled in /monitoring/grafana/dashboards/
# and mounted into the container.

apiVersion: 1

providers:
  - name: 'SKUEL Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
