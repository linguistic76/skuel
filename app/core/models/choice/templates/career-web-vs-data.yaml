# Choice Template: Web Development vs Data Science
# Category: Career Path Discovery
# SKUEL Mission: INSPIRE users by presenting tech career possibilities

template_id: career-web-vs-data
template_version: "1.0"
created_by: "SKUEL"
category: career

# Choice Configuration
title: "Web Development or Data Science?"
description: |
  Choose your tech career path based on your interests and learning style.
  Both paths lead to rewarding careers, but they require different skill sets
  and appeal to different working styles.

inspiration_type: career_path
expands_possibilities: true
vision_statement: "Build your future in tech - choose the path that excites you most"

choice_type: multiple
domain: professional
priority: high

# Options (each opens different learning paths)
options:
  - title: "Web Development"
    description: |
      Build interactive websites and web applications. Focus on user experience,
      visual design, and creating products people use daily. Work with HTML, CSS,
      JavaScript, and modern frameworks like React or Vue.

    opens_learning_paths:
      - lp:web-dev-foundations
      - lp:frontend-mastery
      - lp:full-stack-journey

    informed_by_knowledge_uids:
      - ku:html-basics
      - ku:css-fundamentals
      - ku:javascript-intro
      - ku:web-architecture

    feasibility_score: 0.8
    risk_level: 0.2
    potential_impact: 0.8
    resource_requirement: 0.4
    estimated_duration: 500  # hours

    tags:
      - web
      - frontend
      - visual
      - user-facing

  - title: "Data Science"
    description: |
      Analyze data and build machine learning models. Focus on extracting insights,
      making predictions, and solving problems with data. Work with Python,
      statistics, machine learning, and data visualization.

    opens_learning_paths:
      - lp:python-data-analysis
      - lp:statistics-fundamentals
      - lp:ml-fundamentals

    informed_by_knowledge_uids:
      - ku:python-basics
      - ku:statistics-intro
      - ku:data-analysis-concepts
      - ku:ml-overview

    feasibility_score: 0.7
    risk_level: 0.3
    potential_impact: 0.9
    resource_requirement: 0.6
    estimated_duration: 600  # hours

    tags:
      - data
      - analytics
      - machine-learning
      - statistics

# Decision Guidance
decision_criteria:
  - "Do you prefer visual/interactive work or analytical work?"
  - "Are you more interested in user experience or data insights?"
  - "Do you enjoy seeing immediate visual results or discovering hidden patterns?"
  - "Would you rather build products or solve analytical problems?"

constraints:
  - "Web development requires strong visual/design sense"
  - "Data science requires strong math/statistics foundation"
  - "Both require significant time investment (500-600 hours)"

# Curriculum Integration
requires_knowledge_for_decision:
  - ku:programming-overview
  - ku:career-paths-tech
  - ku:self-assessment-learning-style

aligned_with_principles:
  - principle:continuous-learning
  - principle:skill-mastery
  - principle:deliberate-practice

tags:
  - career
  - tech
  - beginner-friendly
  - high-impact
